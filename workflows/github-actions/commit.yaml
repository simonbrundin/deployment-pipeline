name: Build and Push Docker Image to Docker Hub

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Checka ut koden från repositoryt
      - name: Checkout code
        uses: actions/checkout@v4

      # Versionsnummer
      - name: Get next version
        uses: reecetech/version-increment@2024.10.1
        id: version
        with:
          scheme: semver
          increment: patch

      - name: Bump version and push tag
        uses: anothrNick/github-tag-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: false
          DEFAULT_BUMP: patch
          INITIAL_VERSION: 0.0.1

      # Sätt upp QEMU för multi-plattformsbyggen
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Sätt upp Docker Buildx för att bygga imagen
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Logga in på Registry med hemligheter
      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_ADDRESS }}
          username: ${{ vars.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # Bygg och pusha multi-platform image
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ vars.REGISTRY_ADDRESS }}/${{ github.event.repository.name }}:${{ env.VERSION }}
            ${{ vars.REGISTRY_ADDRESS }}/${{ github.event.repository.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
