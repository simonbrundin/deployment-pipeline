name: Commit Phase

on:
  workflow_call:
    inputs:
      source-dir:
        required: false
        default: "."
        type: string
      image-name:
        required: false
        default: ""
        type: string
      registry-address:
        required: false
        default: ""
        type: string
      registry-username:
        required: false
        default: ""
        type: string
    secrets:
      REGISTRY_PASSWORD:
        required: false
      DAGGER_CLOUD_TOKEN:
        required: false

jobs:
  commit-phase:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Hämta app
        uses: actions/checkout@v4
        with:
          path: app

      - name: Hämta Pipeline
        uses: actions/checkout@v4
        with:
          repository: simonbrundin/deployment-pipeline
          ref: refs/heads/main
          path: pipeline

      - name: Verifiera registry-åtkomst
        run: |
          REGISTRY="${{ inputs.registry-address }}"
          if [ -z "$REGISTRY" ]; then
            REGISTRY="ghcr.io/${{ github.repository_owner }}"
          fi
          TOKEN="${{ secrets.REGISTRY_PASSWORD }}"
          if [ -z "$TOKEN" ]; then
            echo "REGISTRY_PASSWORD is empty, using GITHUB_TOKEN"
            TOKEN="${{ secrets.GITHUB_TOKEN }}"
          fi
          USERNAME="${{ inputs.registry-username }}"
          if [ -z "$USERNAME" ]; then
            USERNAME="${{ github.actor }}"
          fi
          echo "$TOKEN" | docker login "$REGISTRY" -u "$USERNAME" --password-stdin

      - name: Kör Commit Phase
        uses: dagger/dagger-for-github@v8.3.0
        with:
          verb: call
          module: ./dagger-modules/pipeline
          workdir: ./pipeline
          call: commit-phase --source-dir ../app/${{ inputs.source-dir }} --registry-address ${{ inputs.registry-address || format('ghcr.io/{0}', github.repository_owner) }} --image-name ${{ inputs.image-name || github.event.repository.name }} --username ${{ inputs.registry-username || github.actor }} --multi-arch
        env:
          DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
