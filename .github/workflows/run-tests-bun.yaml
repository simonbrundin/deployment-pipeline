name: Kör tester via Bun

on:
  workflow_call:
    inputs:
      package-json-path:
        description: "Sökväg till package.json-katalog"
        type: string
        default: "."

jobs:
  run-bun-tests:
    name: Kör tester via Bun
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ inputs.package-json-path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ${{ inputs.package-json-path }}/node_modules
          key:
            ${{ runner.os }}-bun-${{ inputs.package-json-path }}-${{
            hashFiles(format('{0}/bun.lockb', inputs.package-json-path)) }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ inputs.package-json-path }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test
