name: Bygg och publicera image
on:
  workflow_call:
    outputs:
      image:
        description: "Image reference with digest (t.ex. ghcr.io/user/repo@sha256:…)"
        value: ${{ jobs.publish-image.outputs.image }}
    secrets:
      REGISTRY_TOKEN:
        required: false
    inputs:
      registry:
        description: "Full registry path (t.ex. ghcr.io/simonbrundin/plan)"
        type: string
        required: true
      registry-username:
        description: "Username for registry login"
        type: string
        default: "${{ github.actor }}"
      dockerfile:
        description: "Sökväg till Dockerfile (t.ex. frontend/Dockerfile)"
        type: string
        default: "Dockerfile"
      dockerfile-context:
        description: "Build context (t.ex. frontend/)"
        type: string
        default: "."
jobs:
  build-image:
    name: Bygg image från Dockerfile
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.dockerfile-context }}
          file: ${{ inputs.dockerfile }}
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-image:
    name: Publicera image på registry
    runs-on: ubuntu-latest
    needs: build-image
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ inputs.registry }}@${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Registry
        run: |
          TOKEN="${{ secrets.REGISTRY_TOKEN }}"
          if [ -z "$TOKEN" ]; then
            TOKEN="${{ secrets.GITHUB_TOKEN }}"
          fi
          echo "$TOKEN" | docker login \
            ${{ inputs.registry }} \
            -u ${{ inputs.registry-username }} \
            --password-stdin
      - name: Push image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.dockerfile-context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ inputs.registry }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
