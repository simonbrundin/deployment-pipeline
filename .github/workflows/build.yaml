name: CI
on:
  workflow_call:
    inputs:
      dockerfile:
        description: "Sökväg till Dockerfile (t.ex. frontend/Dockerfile)"
        type: string
        default: "Dockerfile"
      dockerfile-context:
        description: "Build context (t.ex. frontend/)"
        type: string
        default: "."
jobs:
  # unit-tests:
  #   name: Kör Unit-tester
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Checkout
  #       uses: actions/checkout@v4
  #     - name: Run unit tests
  #       run: echo "Lägg till testkommando här"

  build-image:
    name: Bygg image från Dockerfile
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.dockerfile-context }}
          file: ${{ inputs.dockerfile }}
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-image:
    name: Publicera image på registry
    runs-on: ubuntu-latest
    needs: build-image
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: GITHUB_ACTOR
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.dockerfile-context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
